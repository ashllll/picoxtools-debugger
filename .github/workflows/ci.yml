name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: python -m pip install -r mcp/requirements.txt
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Validate JSON
        run: |
          python -m json.tool knowledge/picoxtools.json >/dev/null
          python -m json.tool .codex-plugin/plugin.json >/dev/null
          python -m json.tool .mcp.json >/dev/null
      - name: Validate Reasonix config
        run: |
          python -c 'import tomllib; tomllib.load(open("reasonix.toml", "rb"))'
          python -m py_compile scripts/configure_reasonix.py
      - name: Compile MCP server
        run: python -m py_compile mcp/server.py
